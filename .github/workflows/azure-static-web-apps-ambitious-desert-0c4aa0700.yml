name: PROD Static Web Apps CI/CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Optional production API base URL override
        required: false
        type: string

concurrency:
  group: prod-static-web-app
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  PROD_API_BASE_URL: https://ca-api-gateway.mangotree-31a6d605.eastasia.azurecontainerapps.io

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy PROD Frontend
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ github.event.inputs.api_base_url || env.PROD_API_BASE_URL }}
        run: npm run build

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const core = require('@actions/core');
            return await core.getIDToken();
          result-encoding: string

      - name: Deploy Static Web App
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_DESERT_0C4AA0700 }}
          action: upload
          app_location: /
          app_artifact_location: build
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}
